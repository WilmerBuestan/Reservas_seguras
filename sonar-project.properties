sonar.projectKey=reservas-ec
sonar.projectName=ReservasEC
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8

# Source directories
sonar.sources=.
sonar.exclusions=node_modules/**,dist/**,.git/**,**/test/**,**/*.test.js,**/*.spec.js,*.config.js,coverage/**

# JavaScript/TypeScript settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Coverage
sonar.coverage.exclusions=**/node_modules/**,**/test/**,**/*.test.js,**/*.spec.js

# Quality Gate
sonar.qualitygate.wait=true
